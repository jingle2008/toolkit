name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&' # keep #-tags and @-mentions from breaking markdown

# Categorize by label. autolabeler below applies labels from the PR
# title's conventional-commit prefix, so contributors don't have to.
categories:
  - title: "🚀 Added"
    labels:
      - feature
      - feat
  - title: "🐛 Fixed"
    labels:
      - fix
      - bug
  - title: "🧰 Changed / Refactored"
    labels:
      - refactor
      - changed
  - title: "🏗 Build & CI"
    labels:
      - ci
      - build
  - title: "📝 Docs"
    labels:
      - docs
  - title: "🧪 Tests"
    labels:
      - test
  - title: "🔧 Chore"
    labels:
      - chore
      - style

autolabeler:
  - label: feat
    title:
      - '/^feat(\(.+\))?:/i'
  - label: fix
    title:
      - '/^fix(\(.+\))?:/i'
  - label: refactor
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: ci
    title:
      - '/^ci(\(.+\))?:/i'
  - label: build
    title:
      - '/^build(\(.+\))?:/i'
  - label: docs
    title:
      - '/^docs(\(.+\))?:/i'
  - label: test
    title:
      - '/^test(\(.+\))?:/i'
  - label: chore
    title:
      - '/^chore(\(.+\))?:/i'
  - label: style
    title:
      - '/^style(\(.+\))?:/i'

exclude-labels:
  - skip-changelog

# version-resolver auto-suggests the next tag: minor bump on `feat`,
# patch on everything else, major on `breaking` label.
version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - feat
      - feature
  patch:
    labels:
      - fix
      - bug
      - refactor
      - ci
      - build
      - docs
      - test
      - chore
      - style
  default: patch

sort-direction: ascending

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/jingle2008/toolkit/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

name: Release Drafter

on:
  push:
    branches:
      - main
  # Run on PR events so the autolabeler can apply labels from the title
  # prefix as soon as the PR opens, not only after merge.
  pull_request:
    types: [opened, reopened, synchronize, edited]
    branches:
      - main

permissions:
  contents: write       # required to maintain the draft release
  pull-requests: write  # required by the autolabeler

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

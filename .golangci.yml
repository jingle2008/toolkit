version: "2"
# golangci-lint configuration (schema v2)
# - paralleltest: enforces t.Parallel() in tests; use //nolint:paralleltest with justification for serial tests
# See CONTRIBUTING.md for test best practices.

run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - revive
    - errcheck
    - gocognit
    - ineffassign
    - misspell
    - wastedassign
    - paralleltest
    - gocritic
    - gosec
    - contextcheck
    - unused
    - dupl
    - nilnil
    - prealloc
    - unparam
    - dogsled
    - bodyclose
    - cyclop
    - errorlint
    - containedctx
    - whitespace
  settings:
    cyclop:
      max-complexity: 13
    prealloc:
      simple: true
    revive:
      severity: warning
